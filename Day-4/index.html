<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pokemon Cards </title>

    <!-- GOOGLE FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <!-- ========================= -->
        <!-- TOP SECTION -->
        <!-- ========================= -->

        <div class="top-section">

            <!-- LOGO -->

            <div class="logo">

                <img src="./pokemon.png" alt="Pokemon Logo">

            </div>

            <!-- SEARCH + FILTER -->

            <div class="controls">

                <!-- SEARCH BAR -->

                <div class="search-box">

                    <input
                    type="text"
                    placeholder="Search for a Pokémon...">

                </div>

                <!-- FILTER -->

                <select class="filter">

                    <option>Filter by types</option>

                    <option>Grass</option>

                    <option>Fire</option>

                    <option>Dark</option>

                    <option>Steel</option>

                </select>

            </div>

        </div>

        <!-- ========================= -->
        <!-- CARDS -->
        <!-- ========================= -->

        <div class="cards">

            <!-- CARD 1 -->

            <div class="card grass-card">

                <div class="card-top">

                    <span class="number">#0908</span>

                    <i class="fa-regular fa-heart heart"></i>

                </div>

                <img
                src="https://img.pokemondb.net/artwork/large/meowscarada.jpg"
                class="image">

                <h2 class="name">Meowscarada</h2>

                <div class="bottom">

                    <div class="type grass">

                        <i class="fa-solid fa-leaf"></i>

                        GRASS

                    </div>

                    <div class="arrow">

                        <i class="fa-solid fa-arrow-right"></i>

                    </div>

                </div>

            </div>

            <!-- CARD 2 -->

            <div class="card fire-card">

                <div class="card-top">

                    <span class="number">#0229</span>

                    <i class="fa-regular fa-heart heart"></i>

                </div>

                <img
                src="https://img.pokemondb.net/artwork/large/houndoom.jpg"
                class="image">

                <h2 class="name">Houndoom</h2>

                <div class="bottom">

                    <div class="type fire">

                        <i class="fa-solid fa-fire"></i>

                        FIRE

                    </div>

                    <div class="arrow">

                        <i class="fa-solid fa-arrow-right"></i>

                    </div>

                </div>

            </div>

            <!-- CARD 3 -->

            <div class="card dark-card">

                <div class="card-top">

                    <span class="number">#0624</span>

                    <i class="fa-regular fa-heart heart"></i>

                </div>

                <img
                src="https://img.pokemondb.net/artwork/large/pawniard.jpg"
                class="image">

                <h2 class="name">Pawniard</h2>

                <div class="bottom">

                    <div class="type dark">

                        <i class="fa-solid fa-moon"></i>

                        DARK

                    </div>

                    <div class="arrow">

                        <i class="fa-solid fa-arrow-right"></i>

                    </div>

                </div>

            </div>

            <!-- CARD 4 -->

            <div class="card steel-card">

                <div class="card-top">

                    <span class="number">#0379</span>

                    <i class="fa-regular fa-heart heart"></i>

                </div>

                <img
                src="https://img.pokemondb.net/artwork/large/registeel.jpg"
                class="image">

                <h2 class="name">Registeel</h2>

                <div class="bottom">

                    <div class="type steel">

                        <i class="fa-solid fa-shield"></i>

                        STEEL

                    </div>

                    <div class="arrow">

                        <i class="fa-solid fa-arrow-right"></i>

                    </div>

                </div>

            </div>

        </div>

        <!-- ========================= -->
        <!-- FEATURES -->
        <!-- ========================= -->

        <div class="features">

            <div class="feature-box">

                <i class="fa-solid fa-compass"></i>

                <div>

                    <h4>Explore</h4>

                    <p>Discover all your favorite Pokémon</p>

                </div>

            </div>

            <div class="feature-box">

                <i class="fa-solid fa-leaf"></i>

                <div>

                    <h4>Filter</h4>

                    <p>Find Pokémon by types and abilities</p>

                </div>

            </div>

            <div class="feature-box">

                <i class="fa-solid fa-star"></i>

                <div>

                    <h4>Collection</h4>

                    <p>Save and manage your collection</p>

                </div>

            </div>

            <div class="feature-box">

                <i class="fa-solid fa-chart-simple"></i>

                <div>

                    <h4>Stats</h4>

                    <p>View stats and learn about Pokémon</p>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
